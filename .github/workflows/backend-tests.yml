name: Backend CI

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

jobs:
  test:
    runs_on: ubuntu_latest

    steps:
      name: Checkout repository
      uses: actions/checkout@v4

      name: Setup bun
      uses: oven-sh/setup-bun@v2

      name: Install dependencies
      run: bun install --frozen-lockfile

      name: Run test suites
      run: bun test