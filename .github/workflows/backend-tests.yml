name: Backend CI

on:
  pull_request:
    branches: ["main"]
    paths:
      - "backend/**"
  push:
    branches: ["main"]
    paths:
      - "backend/**"

jobs:
  test-backend:
    runs-on: ubuntu-latest

    defaults:
      run: 
        working-directory: ./backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run test suites
        run: bun test
